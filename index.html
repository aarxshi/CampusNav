<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>DSCE Campus Navigator</title>
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

  <!-- MapLibre -->
  <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- App styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────── -->
<header>
  <button class="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/>
    </svg>
  </button>

  <div class="wordmark">
    <span class="wordmark-main">CampusNav</span>
    <span class="wordmark-tag">DSCE</span>
  </div>

  <div class="hdiv"></div>

  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" type="text" placeholder="Search buildings, departments…"
           id="searchInput" oninput="filterList(this.value); if(!this.value) clearSearchHighlights()" />
  </div>

  <button class="btn-dir" onclick="switchTab('navigate')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
    </svg>
    Directions
  </button>
</header>

<!-- ── MAIN LAYOUT ─────────────────────────────────── -->
<div class="layout">

  <!-- SIDEBAR / BOTTOM SHEET (dual-mode) -->
  <div class="sidebar" id="sidebar">
    <!-- Desktop: drag right edge to resize. Mobile: drag handle at top -->
    <div class="resize-handle" id="resizeHandle">
      <div class="mobile-drag-bar"></div>
    </div>

    <!-- Mobile search bar (inside sheet, hidden on desktop) -->
    <div class="mobile-search-row">
      <div class="search-wrap" style="max-width:none;flex:1">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" placeholder="Search buildings, departments…"
               id="searchInputMobile" oninput="filterList(this.value); if(!this.value) clearSearchHighlights()" />
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-buildings" onclick="switchTab('buildings')">Buildings</div>
      <div class="tab"        id="tab-navigate"  onclick="switchTab('navigate')">Navigate</div>
    </div>

    <!-- Buildings pane -->
    <div class="pane active" id="pane-buildings">
      <div class="building-list" id="buildingList"></div>

      <!-- Info card (shown on selection) -->
      <div class="info-card" id="infoCard">
        <div class="card-img-wrap">
          <img id="cardImg" src="" alt="" />
          <div class="img-ph" id="imgPh">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="m21 15-5-5L5 21"/>
            </svg>
            <span>Building photo coming soon</span>
          </div>
          <button class="card-x" onclick="closeCard()" title="Close">✕</button>
        </div>
        <div class="card-body">
          <div class="card-num"      id="cNum"></div>
          <div class="card-name"     id="cName"></div>
          <div class="card-type-tag" id="cType"></div>
          <div class="dept-list"     id="cDepts"></div>
          <div class="card-btns">
            <button class="btn-sm btn-from" onclick="setFrom()">↑ From here</button>
            <button class="btn-sm btn-to"   onclick="setTo()">↓ To here</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Navigate pane -->
    <div class="pane" id="pane-navigate">
      <div class="nav-inner">
        <div>
          <div class="flabel">
            <div class="fdot" style="background:var(--green)"></div>Starting point
          </div>
          <select class="nav-sel" id="fromSel"><option value="">Choose building…</option></select>
        </div>

        <div class="swap-row">
          <button class="swap-btn" onclick="swapRoute()" title="Swap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M7 16V4m0 0L3 8m4-4 4 4"/><path d="M17 8v12m0 0 4-4m-4 4-4-4"/>
            </svg>
          </button>
        </div>

        <div>
          <div class="flabel">
            <div class="fdot" style="background:var(--red)"></div>Destination
          </div>
          <select class="nav-sel" id="toSel"><option value="">Choose building…</option></select>
        </div>

        <div class="btn-row">
          <button class="btn-find"  onclick="findRoute()">Find Route →</button>
          <button class="btn-reset" onclick="resetRoute()">↺ Reset</button>
        </div>

        <div class="route-card" id="routeCard">
          <div class="route-stats">
            <div class="rstat"><div class="rval" id="rDist">—</div><div class="rlabel">metres</div></div>
            <div class="rstat"><div class="rval" id="rTime">—</div><div class="rlabel">min walk</div></div>
            <div class="rstat"><div class="rval" id="rStops">—</div><div class="rlabel">stops</div></div>
          </div>
          <div class="route-steps" id="rSteps"></div>
        </div>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- MAP -->
  <div id="map">
    <div class="map-badge zoom-ctrls">
      <button class="zbtn" onclick="map.zoomIn()">+</button>
      <button class="zbtn" onclick="map.zoomOut()">−</button>
      <button class="zbtn" id="gpsBtn" onclick="toggleGPS()" title="My location">
        <svg id="gpsIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" stroke-width="1.5" opacity="0.4"/>
        </svg>
      </button>
    </div>
    <div class="map-badge map-legend" id="mapLegend">
      <div class="leg-label" onclick="toggleLegend()">Legend <span id="legArrow">▾</span></div>
      <div id="legBody">
        <div class="leg-item"><div class="leg-swatch" style="background:rgba(22,163,74,.55);border:1.5px solid #16a34a"></div>Start</div>
        <div class="leg-item"><div class="leg-swatch" style="background:rgba(14,165,233,.45);border:1.5px solid #0ea5e9"></div>Selected</div>
        <div class="leg-item"><div class="leg-swatch" style="background:rgba(245,158,11,.55);border:1.5px solid #d97706"></div>Search match</div>
        <div class="leg-item"><div class="leg-swatch" style="background:rgba(220,38,38,.55);border:1.5px solid #dc2626"></div>Destination</div>
        <div class="leg-item">
          <div style="width:18px;height:4px;background:#0ea5e9;border-radius:2px"></div>
          &nbsp;Route
        </div>
      </div>
    </div>
    <!-- Mobile FAB — visible when sheet is hidden -->
    <div id="mobileFab" style="display:none">
      <button class="fab-btn accent" onclick="switchTab('buildings')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Buildings
      </button>
      <div style="width:1px;height:20px;background:var(--border)"></div>
      <button class="fab-btn" onclick="switchTab('navigate')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
        Directions
      </button>
    </div>
  </div>

</div><!-- /layout -->

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- ── SCRIPTS (order matters) ──────────────────────── -->
<script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
<script src="buildings.js"></script>  <!-- data: BUILDINGS, GRAPH -->
<script src="router.js"></script>     <!-- path network router -->
<script src="map.js"></script>        <!-- map init, feature states, dijkstra -->
<script src="ui.js"></script>         <!-- sidebar, info card, nav pane, toast -->

</body>
</html>
